spring.config.import=optional:file:.env[.properties]

server.port=${PORT:8084}
spring.application.name=historial-service

# MySQL
spring.datasource.url=${DB_HISTORIAL_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update

# JWT — mismo secret que los demas servicios
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# OpenAI API
claude.api.url=${CLAUDE_API_URL:https://api.openai.com/v1/chat/completions}
claude.api.key=${CLAUDE_API_KEY:}
claude.model=${CLAUDE_MODEL:gpt-5.4-mini-2026-03-17}

# URL del MS Chatbot (para obtener interacciones en CU012)
chatbot.service.url=${CHATBOT_SERVICE_URL}

# Serializar LocalDate como "2024-03-15" no como [2024,3,15]
spring.jackson.serialization.write-dates-as-timestamps=false
