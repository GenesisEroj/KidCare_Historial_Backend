server.port=${PORT:8084}
spring.application.name=historial-service

# MySQL
spring.datasource.url=${DB_HISTORIAL_URL:jdbc:mysql://localhost:3306/db_historial?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:kidcare123}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update

# JWT — mismo secret que los demas servicios
jwt.secret=${JWT_SECRET:kidcare-secret-key-2024-segura-32chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Claude API
claude.api.key=${CLAUDE_API_KEY:}
claude.model=${CLAUDE_MODEL:claude-sonnet-4-6}

# URL del MS Chatbot (para obtener interacciones en CU012)
chatbot.service.url=${CHATBOT_SERVICE_URL:http://localhost:8083}
